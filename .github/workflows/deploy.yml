name: Deploy Twenty CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jesuisfatih/twenty

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://sales.techifyboost.com
            REACT_APP_BASE_PATH=/
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push DTFBank CRM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dtfbank
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://app.dtfbank.com/crm-app
            REACT_APP_BASE_PATH=/crm-app/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/apps/custom/multiservice/twenty
            echo "Pulling latest image..."
            docker pull ghcr.io/jesuisfatih/twenty:latest
            echo "Restarting containers..."
            docker compose down
            docker compose up -d
            echo "Waiting for Twenty to be healthy..."
            set +e
            for i in $(seq 1 60); do
              if docker exec multiservice-twenty-server curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
                echo "Twenty CRM deployed successfully!"
                exit 0
              fi
              sleep 5
            done
            echo "Health check timeout, checking logs..."
            docker logs multiservice-twenty-server --tail 30
            exit 1
